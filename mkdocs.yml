site_name: moczarr
site_url: https://espg.github.io/moczarr/
site_description: Sparse-DGGS xarray reader for morton-hive zarr stores
repo_url: https://github.com/espg/moczarr
repo_name: espg/moczarr

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocs-jupyter:
      execute: false  # committed-executed: outputs live in the notebook
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Example notebook: examples/quickstart.ipynb
  - Concepts: concepts.md
  - API reference:
      - open: api/open.md
      - join: api/join.md
      - moc_index: api/moc_index.md
      - ranges: api/ranges.md
      - fabricate: api/fabricate.md
      - dggs: api/dggs.md
      - convention: api/convention.md
      - coverage: api/coverage.md
      - store: api/store.md
      - exceptions: api/exceptions.md
  - Development: development.md
